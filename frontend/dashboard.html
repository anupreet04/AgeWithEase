<!DOCTYPE html>
<html>

<head>

<title>AgeWithEase Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#f3ecff,#e0d4ff);
color:#333;
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:linear-gradient(180deg,#bfa2ff,#8e6ef7);
color:white;
padding-top:30px;
position:fixed;
box-shadow:5px 0 20px rgba(0,0,0,0.1);
}

.sidebar h2{
text-align:center;
margin-bottom:35px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:16px 28px;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
padding-left:38px;
}

/* MAIN */
.main-content{
margin-left:260px;
padding:35px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

.topbar h1{
font-size:28px;
color:#6a4cff;
}

.bell{
font-size:26px;
cursor:pointer;
}

#clock{
font-size:24px;
color:#6a4cff;
margin-top:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(10px);
padding:22px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-top:0;
color:#6a4cff;
}

.card p{
font-size:15px;
}

/* SOS */
.sos{
background:linear-gradient(45deg,#ff4d4d,#ff0000);
color:white;
border:none;
padding:14px;
border-radius:10px;
width:100%;
cursor:pointer;
font-weight:600;
}

.sos:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🌸 AgeWithEase</h2>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="profile.html">👤 Profile</a>
<a href="routine.html">⏰ Daily Care</a>
<a href="assistant.html">🤖 AI Assistant</a>
<a href="caregiver.html">👩‍⚕ Caregiver</a>
<a href="login.html">🚪 Logout</a>

</div>

<div class="main-content">

<div class="topbar">
<h1 id="greetingText"></h1>
<div class="bell" onclick="showNotifications()">🔔</div>
</div>

<h2 id="clock"></h2>

<div class="grid">

<div class="card">
<h3>👤 Profile</h3>
<p>Name: <span id="profileName">-</span></p>
<p>Age: <span id="profileAge">-</span></p>
</div>

<div class="card">
<h3>🚨 Health Alerts</h3>
<p id="healthAlert"></p>
</div>

<div class="card">
<h3>🤖 AI Suggestion</h3>
<p id="aiSuggestion"></p>
</div>

<div class="card">
<h3>📊 Daily Status</h3>
<p id="routineScore"></p>
<p id="routineCount"></p>
<p id="medicineStatus"></p>
<p id="moodStatusCard"></p>
</div>

<div class="card">
<h3>📅 Weekly Report</h3>
<p id="weeklyReport"></p>
</div>

<div class="card">
<h3>🚑 Emergency</h3>
<button class="sos" onclick="sendSOS()">SOS Emergency</button>
<p id="sosStatus"></p>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
