<!DOCTYPE html>
<html>
<head>

<title>Login - AgeWithEase</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#f3ecff,#dcd0ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* Glass Card */
.login-box{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
padding:40px;
border-radius:20px;
width:340px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
animation:fadeIn 0.8s ease;
}

/* Title */
h2{
color:#6a4cff;
margin-bottom:25px;
}

/* Inputs */
input{
width:100%;
padding:14px;
margin-bottom:15px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.7);
font-size:14px;
transition:0.3s;
}

input:focus{
background:white;
box-shadow:0 0 8px rgba(142,110,247,0.5);
}

/* Button */
button{
width:100%;
padding:14px;
background:linear-gradient(45deg,#8e6ef7,#6a4cff);
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* Guest */
.extra{
margin-top:12px;
font-size:14px;
color:#555;
cursor:pointer;
}

.extra:hover{
color:#6a4cff;
}

/* Animation */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="login-box">

<h2>🔐 Welcome Back</h2>

<input type="text" id="username" placeholder="Enter Name">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="extra" onclick="guestLogin()">Continue as Guest</div>

</div>

<script>

function login(){
let user=document.getElementById("username").value;

if(user===""){
alert("Enter name first");
return;
}

localStorage.setItem("user",user);
window.location.href="dashboard.html";
}

function guestLogin(){
localStorage.setItem("user","Guest");
window.location.href="dashboard.html";
}

</script>

</body>
</html>
