<!DOCTYPE html>
<html>

<head>

<title>Elder Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#f3ecff,#e0d4ff);
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:linear-gradient(180deg,#bfa2ff,#8e6ef7);
color:white;
padding-top:30px;
position:fixed;
box-shadow:5px 0 20px rgba(0,0,0,0.1);
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:15px 25px;
}

/* MAIN */
.main-content{
margin-left:260px;
padding:40px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CARD */
.card{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
padding:35px;
border-radius:18px;
width:100%;
max-width:700px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.card h2{
color:#6a4cff;
text-align:center;
margin-bottom:25px;
}

/* GRID */
.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.full{
grid-column:span 2;
}

/* INPUT */
input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

/* BUTTON */
button{
width:100%;
padding:14px;
background:linear-gradient(135deg,#8e6ef7,#6a4cff);
color:white;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

button:hover{
transform:scale(1.03);
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🌸 AgeWithEase</h2>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="profile.html">👤 Profile</a>
<a href="routine.html">⏰ Daily Care</a>
<a href="assistant.html">🤖 AI Assistant</a>
<a href="caregiver.html">👩‍⚕ Caregiver</a>
<a href="login.html">🚪 Logout</a>

</div>

<div class="main-content">

<div class="card">

<h2>👤 Elder Profile</h2>

<div class="form-grid">

<input type="text" id="name" placeholder="Full Name">
<input type="number" id="age" placeholder="Age">

<input type="text" id="blood" placeholder="Blood Group">
<input type="text" id="contact" placeholder="Emergency Contact">

<input type="text" id="condition" class="full" placeholder="Medical Conditions">
<input type="text" id="allergy" class="full" placeholder="Allergies">

<input type="text" id="doctor" placeholder="Doctor Name">
<input type="text" id="doctorContact" placeholder="Doctor Contact">

</div>

<button onclick="saveProfile()">Save Profile</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
