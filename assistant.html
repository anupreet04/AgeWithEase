<!DOCTYPE html>
<html>

<head>

<title>AI Caregiver Assistant</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#f3ecff,#e0d4ff);
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:linear-gradient(180deg,#bfa2ff,#8e6ef7);
color:white;
padding-top:30px;
position:fixed;
box-shadow:5px 0 20px rgba(0,0,0,0.1);
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:16px 28px;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
padding-left:35px;
}

/* MAIN */
.main-content{
margin-left:260px;
padding:40px;
}

/* CHATBOX */
.chatbox{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
height:420px;
overflow-y:auto;
padding:20px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
margin-bottom:20px;
}

/* MESSAGES */
.message{
margin-bottom:12px;
padding:12px 16px;
border-radius:12px;
max-width:70%;
font-size:14px;
}

.user{
background:#dcd0ff;
margin-left:auto;
}

.bot{
background:white;
color:#5a45d6;
}

/* INPUT */
.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:12px 16px;
background:linear-gradient(135deg,#8e6ef7,#6a4cff);
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

/* SUGGESTIONS */
.suggestions{
margin-bottom:15px;
}

.suggestions button{
background:white;
color:#5a45d6;
border:none;
padding:8px 14px;
margin:4px;
border-radius:20px;
cursor:pointer;
font-size:13px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.suggestions button:hover{
background:#dcd0ff;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🌸 AgeWithEase</h2>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="profile.html">👤 Profile</a>
<a href="routine.html">⏰ Daily Care</a>
<a href="assistant.html">🤖 AI Assistant</a>
<a href="caregiver.html">👩‍⚕ Caregiver</a>
<a href="login.html">🚪 Logout</a>

</div>

<div class="main-content">

<h2>🤖 AI Caregiver Assistant</h2>

<div class="chatbox" id="chatbox">

<div class="bot message">
Hello 👋 I’m your AI caregiver assistant. How can I help you today?
</div>

</div>

<div class="suggestions">
<button onclick="quickMessage('I am not feeling good today')">Not feeling good today</button>
<button onclick="quickMessage('I feel lonely')">Feeling lonely</button>
<button onclick="quickMessage('Remind me about medicine')">Medicine reminder</button>
<button onclick="quickMessage('I want to relax')">Relax</button>
</div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ask something..." onkeypress="handleEnter(event)">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script src="script.js"></script>

<script>
function handleEnter(e){
if(e.key === "Enter"){
sendMessage();
}
}
</script>

</body>
</html>
